version: 2
updates:
  # Web app dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]
    # Auto-approve patch security updates
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Mobile app dependencies
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
